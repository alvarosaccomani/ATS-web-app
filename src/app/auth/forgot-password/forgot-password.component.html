<div class="d-flex align-items-center justify-content-center min-vh-100 p-3 bg-light bg-opacity-25" style="background-color: #F8FAFC;">
  
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden w-100" style="max-width: 480px;">
    
    <div class="card-body p-4 p-md-5">
      
      <!-- Cabecera de la marca -->
      <div class="text-center mb-4">
        <svg class="mb-3 cursor-pointer" routerLink="/public/home" width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,15 15,75 85,75" stroke="#0A2540" stroke-width="6" stroke-linejoin="round"/>
          <circle cx="50" cy="15" r="5" fill="#00E5FF"/>
          <circle cx="15" cy="75" r="5" fill="#00E5FF"/>
          <circle cx="85" cy="75" r="5" fill="#00E5FF"/>
          <circle cx="50" cy="55" r="14" fill="#0A2540"/>
        </svg>
        <h1 class="h3 fw-extrabold mb-1" style="color: #0A2540;">Recuperar Contraseña</h1>
        <p class="text-muted small">Ingresá tu correo electrónico para enviarte un enlace de recuperación.</p>
      </div>

      <!-- Alertas de estado -->
      <div *ngIf="successMessage" class="alert alert-success rounded-3 small p-3 mb-4 animate-fade-in" role="alert">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="alert alert-danger rounded-3 small p-3 mb-4 animate-fade-in" role="alert">
        <strong>Error:</strong> {{ errorMessage }}
      </div>

      <!-- Formulario Reactivo -->
      <form *ngIf="!successMessage" [formGroup]="forgotForm" (ngSubmit)="onSubmit()" novalidate>
        
        <div class="mb-4">
          <label for="usr_email" class="form-label small fw-bold text-dark">Correo Electrónico</label>
          <input type="email" id="usr_email" formControlName="usr_email"
                 class="form-control px-3 py-2 rounded-3 text-sm"
                 [ngClass]="{ 'is-invalid': submitted && forgotForm.get('usr_email')?.errors }"
                 placeholder="correo@ejemplo.com"/>
          <div *ngIf="submitted && forgotForm.get('usr_email')?.errors?.['required']" class="invalid-feedback small">
            El correo electrónico es obligatorio.
          </div>
          <div *ngIf="forgotForm.get('usr_email')?.errors?.['email']" class="invalid-feedback small">
            Por favor introduce un formato de correo válido.
          </div>
        </div>

        <!-- Botón de Envío -->
        <button type="submit" [disabled]="loading" class="btn text-white w-100 py-2.5 fw-semibold transition-all rounded-3 shadow hover-btn-cyan d-flex align-items-center justify-content-center gap-2" style="background-color: #0A2540;">
          <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          {{ loading ? 'Enviando...' : 'Enviar enlace' }}
        </button>

      </form>

      <!-- Pie del formulario -->
      <div class="text-center mt-4 pt-2 border-top border-light">
        <a routerLink="/auth/login" class="small text-decoration-none fw-semibold transition-colors link-muted" style="color: #64748B;">
          &larr; Volver al Iniciar Sesión
        </a>
      </div>

    </div>
  </div>

</div>
